version: '3.9'

services:
  ept-connect-backend:
    image: ept-connect-backend:latest
    container_name: ept-connect-backend
    restart: unless-stopped
  
    ports:
      - "5000:5000"
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ept-network

networks:
  ept-network:
    driver: bridge